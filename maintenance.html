<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>軽音楽部 部室予約システム — メンテナンス中</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    background: #F7F9F5; color: #1F2A1B;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 420px; width: 100%;
    background: #fff; border: 1px solid #E2E8DC;
    border-radius: 16px; padding: 36px 28px;
    text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: #5C8A2E; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin: 0 auto 18px;
  }
  h1 { font-size: 17px; margin-bottom: 10px; }
  p { font-size: 13px; color: #6B7563; line-height: 1.7; margin-bottom: 6px; }
  .note {
    margin-top: 20px; font-size: 11px; color: #9AA593;
    border-top: 1px solid #E2E8DC; padding-top: 14px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">♪</div>
    <h1>ただいまメンテナンス中です</h1>
    <p>予約システムを一時的に調整しています。</p>
    <p>少し時間をおいてから、もう一度お試しください。</p>
    <div class="note">ご不便をおかけしますが、よろしくお願いします。</div>
  </div>
</body>
</html>
