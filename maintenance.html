<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メンテナンス中</title>
<!-- Google Fonts: Noto Sans JP -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Font Awesome (フッターとスケジュールアイコン用) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --bg-color: #e4f0fc;
        --card-bg: #ffffff;
        --text-main: #2c3e50;
        --text-sub: #475569;
        --accent-blue: #1b5693;
        --icon-bg-blue: #84bbf1; /* 画像の水色を再現 */
        --border-color: #d1e2f3;
        --divider-dotted: #a6cbf0;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background-color: var(--bg-color);
        font-family: 'Noto Sans JP', sans-serif;
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .maintenance-card {
        background-color: var(--card-bg);
        width: 100%;
        max-width: 500px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        padding: 50px 40px;
        text-align: center;
    }

    /* アイコンコンテナ（水色の円） */
    .icon-container {
        width: 120px;
        height: 120px;
        background-color: var(--icon-bg-blue);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 30px;
        /* ペンギンが円からはみ出ないように */
        overflow: hidden; 
    }

    /* 再現したペンギンSVG */
    .icon-container svg {
        width: 60px; /* 画像のサイズ感を再現 */
        height: auto;
        fill: white; /* 白いペンギン */
        display: block;
    }

    /* ペンギンの写真アイコン */
    .icon-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    .divider-dotted {
        border: none;
        border-top: 3px dotted var(--divider-dotted);
        margin: 0 auto 25px;
        width: 100%;
    }

    .message {
        font-size: 15px;
        line-height: 1.8;
        color: var(--text-main);
        margin-bottom: 30px;
    }

    .divider-solid {
        border: none;
        border-top: 1px solid var(--border-color);
        margin: 30px 0;
    }

    .schedule-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px;
    }

    .schedule-block {
        flex: 1;
        text-align: left;
    }

    .schedule-block.right {
        text-align: left;
        padding-left: 20px;
    }

    .schedule-label {
        font-size: 12px;
        color: var(--accent-blue);
        font-weight: 700;
        margin-bottom: 12px;
        display: block;
    }

    .schedule-time {
        display: flex;
        align-items: center;
        font-size: 18px;
        margin-bottom: 8px;
        color: var(--text-main);
        letter-spacing: 0.5px;
    }

    .schedule-time i {
        width: 24px;
        color: var(--text-sub);
        font-size: 16px;
    }

    .schedule-arrow {
        color: var(--icon-bg-blue);
        font-size: 20px;
        padding: 0 10px;
        display: flex;
        align-items: center;
        height: 100%;
        position: relative;
        top: 10px;
    }
    
    .schedule-divider-vertical {
        width: 1px;
        height: 60px;
        background-color: var(--border-color);
        margin: 0 5px;
        position: relative;
        top: 10px;
    }

    .footer-info {
        display: flex;
        flex-direction: column;
        gap: 12px;
        font-size: 14px;
        color: var(--text-main);
    }

    .footer-info div {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .footer-info i {
        color: var(--accent-blue);
        font-size: 16px;
    }

    @media (max-width: 480px) {
        .maintenance-card {
            padding: 40px 20px;
        }
        
        .schedule-time {
            font-size: 16px;
        }
        
        .schedule-label {
            font-size: 11px;
        }
        
        .schedule-block.right {
            padding-left: 10px;
        }
    }
</style>
</head>
